{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi mapa — Ferv</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      z-index: 10;
    }

    .topbar h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      max-width: 480px;
      margin-left: auto;
    }

    .search-wrap input {
      flex: 1;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111;
      color: #f0f0f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: #7c6bfa; }

    .btn {
      padding: 9px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #7c6bfa; color: #fff; }
    .btn-ghost   { background: #2a2a2a; color: #ccc; }

    /* ── Canvas ── */
    #graph-canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    /* ── D3 elements ── */
    .link {
      stroke: #3a3a5a;
      stroke-opacity: 0.7;
      stroke-width: 1.5px;
    }

    .node circle {
      stroke-width: 2px;
      cursor: pointer;
      transition: r 0.15s;
    }

    .node:hover circle { filter: brightness(1.2); }

    .node text {
      font-size: 12px;
      fill: #e0e0e0;
      pointer-events: none;
      text-anchor: middle;
    }

    .node text.sub {
      font-size: 10px;
      fill: #888;
    }

    /* edge label */
    .edge-label {
      font-size: 10px;
      fill: #666;
      pointer-events: none;
    }

    /* ── Side panel ── */
    .panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 280px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 18px;
      display: none;
      z-index: 20;
    }

    .panel.open { display: block; }

    .panel h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .panel .neighborhood {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }

    .panel .rating {
      font-size: 13px;
      color: #f0c040;
      margin-bottom: 14px;
    }

    .panel .close-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    .panel .close-btn:hover { color: #ccc; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #2a2a3a;
      color: #e0e0ff;
      border: 1px solid #4a4a7a;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      transition: transform 0.25s ease;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Empty state ── */
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #444;
      gap: 10px;
      pointer-events: none;
    }

    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    /* ── Loading spinner ── */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #444;
      border-top-color: #7c6bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>Mi mapa</h1>
  <div class="search-wrap">
    <input id="query-input" type="text"
           placeholder="¿Qué estás buscando? ej: café tranquilo para trabajar"
           autocomplete="off"/>
    <div class="spinner" id="spinner"></div>
    <button class="btn btn-primary" id="search-btn" onclick="runSearch()">Explorar</button>
  </div>
</div>

<!-- Canvas -->
<div id="graph-canvas">

  <!-- Empty state -->
  <div class="empty-state" id="empty-state">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <p>Escribe algo para descubrir lugares</p>
  </div>

  <svg id="svg-graph"></svg>

  <!-- Node detail panel -->
  <div class="panel" id="detail-panel">
    <button class="close-btn" onclick="closePanel()">×</button>
    <h3 id="panel-name">—</h3>
    <div class="neighborhood" id="panel-neighborhood">—</div>
    <div class="rating" id="panel-rating">—</div>
    <button class="btn btn-primary" style="width:100%" id="panel-add-btn">
      + Agregar a mi mapa
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const GRAPH_API = "{% url 'graph:graph-api' %}";
const ADD_API   = "{% url 'graph:add-node' %}";
const CSRF      = "{{ csrf_token }}";

let simulation = null;
let currentGraph = null;
let selectedNode = null;

/* ─── Search ─── */
async function runSearch() {
  const q = document.getElementById('query-input').value.trim();
  if (!q) return;

  setLoading(true);
  try {
    const res = await fetch(`${GRAPH_API}?q=${encodeURIComponent(q)}&top_k=6`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    currentGraph = data.graph;
    renderGraph(data.graph);
    document.getElementById('empty-state').style.display = 'none';
  } catch (e) {
    showToast('Error al cargar el grafo. Intenta de nuevo.');
  } finally {
    setLoading(false);
  }
}

document.getElementById('query-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') runSearch();
});

/* ─── D3 graph ─── */
function renderGraph(graph) {
  const svg = d3.select('#svg-graph');
  svg.selectAll('*').remove();

  const W = document.getElementById('graph-canvas').clientWidth;
  const H = document.getElementById('graph-canvas').clientHeight;

  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => {
    g.attr('transform', e.transform);
  }));

  const nodes = graph.nodes.map(n => ({ ...n }));
  const edges = graph.edges.map(e => ({
    source: nodes.find(n => n.id === e.from_node),
    target: nodes.find(n => n.id === e.to_node),
    weight: e.weight,
    reason: e.reason,
  })).filter(e => e.source && e.target);

  // Simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).distance(d => 140 - d.weight * 60).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-320))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(52));

  // Edges
  const link = g.append('g').selectAll('line')
    .data(edges).join('line').attr('class', 'link')
    .attr('stroke-width', d => 1 + d.weight * 2);

  // Edge labels
  const edgeLabel = g.append('g').selectAll('text')
    .data(edges).join('text')
    .attr('class', 'edge-label')
    .text(d => d.reason ? d.reason.slice(0, 28) : '');

  // Node color scale
  const color = d3.scaleOrdinal()
    .domain(nodes.map(n => n.neighborhood))
    .range(['#7c6bfa','#fa6b8a','#6bfac8','#fac86b','#6baafa','#fa6bfa']);

  // Nodes
  const node = g.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag',  dragging)
      .on('end',   dragEnd))
    .on('click', (event, d) => openPanel(d));

  node.append('circle')
    .attr('r', 36)
    .attr('fill', d => color(d.neighborhood) + '22')
    .attr('stroke', d => color(d.neighborhood));

  // Favorite star
  node.filter(d => d.is_favorite)
    .append('text')
    .attr('y', -28)
    .attr('text-anchor', 'middle')
    .attr('font-size', '14px')
    .text('★');

  node.append('text')
    .attr('y', 4)
    .text(d => truncate(d.name, 16))
    .attr('fill', d => color(d.neighborhood));

  node.append('text')
    .attr('class', 'sub')
    .attr('y', 18)
    .text(d => d.neighborhood ? truncate(d.neighborhood, 14) : '');

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

    edgeLabel
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2);

    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

/* ─── Drag ─── */
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

/* ─── Panel ─── */
function openPanel(d) {
  selectedNode = d;
  document.getElementById('panel-name').textContent = d.name;
  document.getElementById('panel-neighborhood').textContent = d.neighborhood || 'Medellín';
  document.getElementById('panel-rating').textContent = d.rating ? `★ ${d.rating}` : '';
  document.getElementById('detail-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedNode = null;
}

document.getElementById('panel-add-btn').addEventListener('click', async () => {
  if (!selectedNode) return;
  const btn = document.getElementById('panel-add-btn');
  btn.disabled = true;
  try {
    const res = await fetch(ADD_API, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': CSRF,
      },
      body: JSON.stringify({ place_id: selectedNode.place_id }),
    });
    const data = await res.json();
    if (res.ok) {
      showToast(data.message || '¡Lugar agregado a tu mapa!');
      closePanel();
    } else {
      showToast(data.error || 'No se pudo agregar el lugar.');
      btn.disabled = false;
    }
  } catch {
    showToast('Error de conexión.');
    btn.disabled = false;
  }
});

/* ─── Helpers ─── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setLoading(on) {
  document.getElementById('spinner').classList.toggle('show', on);
  document.getElementById('search-btn').disabled = on;
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '…' : str;
}
</script>
</body>
</html>
