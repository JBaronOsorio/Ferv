<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Ferv{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      color: #f0f0f0;
    }

    .card {
      background-color: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }

    .card__logo {
      font-size: 2rem;
      font-weight: 800;
      color: #e94560;
      letter-spacing: -1px;
      margin-bottom: 0.25rem;
    }

    .card__subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .messages { margin-bottom: 1.25rem; }

    .message {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .message--success { background: #1a3a2a; color: #4ade80; border: 1px solid #166534; }
    .message--error   { background: #3a1a1a; color: #f87171; border: 1px solid #991b1b; }
    .message--info    { background: #1a2a3a; color: #60a5fa; border: 1px solid #1e3a5f; }

    .form__group { margin-bottom: 1.25rem; }

    .form__label {
      display: block;
      font-size: 0.875rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }

    .form__input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .form__input:focus {
      outline: none;
      border-color: #45dee9;
    }

    .form__error {
      font-size: 0.8rem;
      color: #71b9f8;
      margin-top: 0.4rem;
    }

    .form__help {
      font-size: 0.78rem;
      color: #666;
      margin-top: 0.3rem;
    }

    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover { opacity: 0.88; }
    .btn--primary { background: #45dee9; color: #fff; }

    .card__footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #666;
    }

    .card__footer a { color: #45dee9; text-decoration: none; }
    .card__footer a:hover { text-decoration: underline; }

    /* Checkboxes y radios */
    .choices__section { margin-bottom: 1.75rem; }

    .choices__label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f0f0f0;
      margin-bottom: 0.75rem;
      display: block;
    }

    .choices__help {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 0.75rem;
    }

    .choices__grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.5rem;
    }

    .choices__grid li { list-style: none; }

    .choices__grid label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .choices__grid label:hover {
      border-color: #45dee9;
      background: #1f0f14;
    }

    .choices__grid input[type="checkbox"]:checked + span,
    .choices__grid input[type="radio"]:checked + span {
      color: #45dee9;
    }

    .choices__grid label:has(input:checked) {
      border-color: #45dee9;
      background: #1f0f14;
    }

    .progress {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 2rem;
    }

    .progress__step {
      height: 4px;
      flex: 1;
      border-radius: 2px;
      background: #2a2a2a;
    }

    .progress__step--active { background: #45dee9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card__logo">ferv</div>
    <div class="card__subtitle">{% block subtitle %}Descubre tu ciudad{% endblock %}</div>

    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message message--{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
