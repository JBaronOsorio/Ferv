<html>
    <head>
        <title>Login</title>
    </head>
    <body>
        <h1>Login</h1>

        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>

        <p>Do not have an account? <a href="{% url 'user:register' %}">Register</a></p>
    </body>
</html>
