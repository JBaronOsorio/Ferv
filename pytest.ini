[pytest]
DJANGO_SETTINGS_MODULE = ferv_project.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
testpaths = ferv_project
markers =
    integration: Integration tests that hit multiple systems
    unit: Unit tests for isolated components
    slow: Slow tests
    skip: Skip marker for pending features
