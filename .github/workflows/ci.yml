name: CI — Ferv Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ferv_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: ferv_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      GEMINI_API_KEY: dummy-key

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Esperar PostgreSQL
        run: |
          max_attempts=30
          attempt=1

          until pg_isready -h localhost -p 5432 -U postgres
          do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "PostgreSQL no estuvo listo después de $max_attempts intentos."
              exit 1
            fi

            echo "Esperando PostgreSQL... intento $attempt de $max_attempts"
            attempt=$((attempt + 1))
            sleep 2
          done

      - name: Ejecutar tests
        run: |
          cd ferv_project
          pytest -v
